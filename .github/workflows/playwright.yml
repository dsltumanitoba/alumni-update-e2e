name: Playwright E2E Tests

on:
  # schedule:
  #   - cron: '0 13 * * *'   # 8:00 AM CDT (UTC-5)
  #   - cron: '0 21 * * *'   # 4:00 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test to run'
        required: false
        default: 'All tests'
        type: choice
        options:
          - All tests
          - 'Journey 1: Update personal contact information'
          - 'Journey 2: Update business contact information'
          - 'Journey 3: Submit a notice of decease'
          - 'Journey 4: Update personal and business contact information together'
          - 'Journey 5: Alumni with no email address'
          - 'Journey 6: Alumni with graduation name different from current name'
          - 'Form validation'
          - 'Intentional failure demo'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          case "${{ inputs.test_filter }}" in
            "All tests"|"")
              npx playwright test ;;
            "Journey 1: Update personal contact information")
              npx playwright test tests/happy-paths/personal-contact.spec.ts ;;
            "Journey 2: Update business contact information")
              npx playwright test tests/happy-paths/business-contact.spec.ts ;;
            "Journey 3: Submit a notice of decease")
              npx playwright test tests/happy-paths/notice-of-decease.spec.ts ;;
            "Journey 4: Update personal and business contact information together")
              npx playwright test tests/happy-paths/combined-update.spec.ts ;;
            "Journey 5: Alumni with no email address")
              npx playwright test tests/happy-paths/no-email.spec.ts ;;
            "Journey 6: Alumni with graduation name different from current name")
              npx playwright test tests/happy-paths/graduation-name.spec.ts ;;
            "Form validation")
              npx playwright test tests/validation/validation.spec.ts ;;
            "Intentional failure demo")
              npx playwright test tests/validation/validation.spec.ts --grep "Intentional failure demo" ;;
          esac
        env:
          CI: true
          ALUMNI_FORM_URL: ${{ secrets.ALUMNI_FORM_URL }}

      - name: Upload raw artifact (always, for download)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deploy
        uses: actions/deploy-pages@v4
