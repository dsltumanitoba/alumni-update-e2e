name: Playwright E2E Tests

on:
  # schedule:
  #   - cron: '0 13 * * *'   # 8:00 AM CDT (UTC-5)
  #   - cron: '0 21 * * *'   # 4:00 PM CDT (UTC-5)
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test to run'
        required: false
        default: 'All tests'
        type: choice
        options:
          - All tests
          - personal-contact.spec.ts
          - business-contact.spec.ts
          - combined-update.spec.ts
          - notice-of-decease.spec.ts
          - no-email.spec.ts
          - graduation-name.spec.ts
          - validation.spec.ts

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          FILTER="${{ inputs.test_filter }}"
          if [ -z "$FILTER" ] || [ "$FILTER" = "All tests" ]; then
            npx playwright test
          else
            npx playwright test "$FILTER"
          fi
        env:
          CI: true
          ALUMNI_FORM_URL: ${{ secrets.ALUMNI_FORM_URL }}

      - name: Upload raw artifact (always, for download)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always()
        id: deploy
        uses: actions/deploy-pages@v4
